name: Desktop Build

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build macOS DMG (Apple Silicon)
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build DMG
        run: ./gradlew packageDmg --stacktrace

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: LogMeow-dmg
          path: build/compose/binaries/main/dmg/*.dmg
